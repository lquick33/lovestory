<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Story</title>

  <link rel="stylesheet" href="lovestory.css">

  <!-- Schriftarten -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=Pacifico&family=Lilita+One&display=swap" 
    rel="stylesheet"
  >
</head>

<body>

  <!-- Text oben links -->
  <div class="corner-text">
    I ♥️ U
  </div>

  <main class="container">

    <!-- Linke Seite: Schrift + Countdown -->
    <section class="countdown-section">

      <p class="handwritten">
        Better together L & T
      </p>

      <div class="countdown-box">
        <h1>Since...</h1>

        <div class="time-grid">

          <div class="time-card">
            <span id="days">0</span>
            <p>Tage</p>
          </div>

          <div class="time-card">
            <span id="hours">0</span>
            <p>Stunden</p>
          </div>

          <div class="time-card">
            <span id="minutes">0</span>
            <p>Minuten</p>
          </div>

          <div class="time-card">
            <span id="seconds">0</span>
            <p>Sekunden</p>
          </div>

        </div>
      </div>

    </section>

    <!-- Rechte Seite: Figur -->
    <section class="person-section">

      <div class="person">

        <!-- Haare -->
        <div class="hair"></div>

        <!-- Kopf -->
        <div class="head">
          <div class="eye eye-left"></div>
          <div class="eye eye-right"></div>
          <div class="mouth"></div>
        </div>

        <!-- Hals -->
        <div class="neck"></div>

        <!-- Shirt -->
        <div class="shirt">
          <div class="shirt-print">

            <div class="shirt-top-line">
              <span class="shirt-i">I</span>
              <span class="shirt-heart">♥</span>
            </div>

            <div class="shirt-name-box">
              <span class="shirt-name">TIMO</span>
            </div>

          </div>
        </div>

        <!-- Arme: müssen AUSSERHALB vom Shirt-Div stehen -->
        <div class="arm arm-left"></div>
        <div class="arm arm-right"></div>

        <!-- Beine: müssen AUSSERHALB vom Shirt-Div stehen -->
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>

        <!-- Schuhe -->
        <div class="shoe shoe-left"></div>
        <div class="shoe shoe-right"></div>

      </div>

    </section>

  </main>

  <script src="lovestory.js"></script>
</body>
</html>
